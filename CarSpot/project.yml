name: CarSpot
options:
  bundleIdPrefix: com.carspot
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleGenerativeAI:
    url: https://github.com/google/generative-ai-swift
    from: "0.5.6"

targets:
  CarSpot:
    type: application
    platform: iOS
    sources:
      - path: CarSpot
    info:
      path: CarSpot/Info.plist
      properties:
        CFBundleDisplayName: CarSpot
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: CarSpot needs camera access to photograph cars you spot.
        NSLocationWhenInUseUsageDescription: CarSpot records where you spotted each car.
        NSPhotoLibraryAddUsageDescription: CarSpot can save car photos to your library.
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.carspot.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseStorage
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: GoogleGenerativeAI
